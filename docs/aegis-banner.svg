<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d2ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Glow line -->
  <rect x="100" y="148" width="600" height="2" rx="1" fill="url(#glow)"/>
  <rect x="100" y="148" width="600" height="2" rx="1" fill="url(#glow)" filter="url(#softglow)"/>

  <!-- Shield icon -->
  <g transform="translate(160, 58)">
    <!-- Shield glow -->
    <path d="M30 0 L60 12 L60 36 C60 60 30 80 30 80 C30 80 0 60 0 36 L0 12 Z"
          fill="url(#shield)" opacity="0.2" filter="url(#softglow)"/>
    <!-- Shield -->
    <path d="M30 4 L56 14 L56 36 C56 56 30 74 30 74 C30 74 4 56 4 36 L4 14 Z"
          fill="none" stroke="url(#shield)" stroke-width="2.5"/>
    <!-- Checkmark inside shield -->
    <path d="M18 38 L26 48 L44 28" fill="none" stroke="url(#shield)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="260" y="95" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="4">AEGIS</text>

  <!-- Subtitle -->
  <text x="260" y="125" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#8b8ba7" letter-spacing="6" font-weight="300">AGENTIC PROJECT AUTOPILOT</text>

  <!-- Pipeline dots -->
  <g transform="translate(260, 145)">
    <circle cx="0" cy="0" r="3" fill="#00d2ff"/>
    <line x1="6" y1="0" x2="34" y2="0" stroke="#00d2ff" stroke-width="1" opacity="0.4"/>
    <circle cx="40" cy="0" r="3" fill="#1ab4ef"/>
    <line x1="46" y1="0" x2="74" y2="0" stroke="#1ab4ef" stroke-width="1" opacity="0.4"/>
    <circle cx="80" cy="0" r="3" fill="#3596df"/>
    <line x1="86" y1="0" x2="114" y2="0" stroke="#3596df" stroke-width="1" opacity="0.4"/>
    <circle cx="120" cy="0" r="3" fill="#4f78cf"/>
    <line x1="126" y1="0" x2="154" y2="0" stroke="#4f78cf" stroke-width="1" opacity="0.4"/>
    <circle cx="160" cy="0" r="3" fill="#6a5abf"/>
    <line x1="166" y1="0" x2="194" y2="0" stroke="#6a5abf" stroke-width="1" opacity="0.4"/>
    <circle cx="200" cy="0" r="3" fill="#7b4db7"/>
    <line x1="206" y1="0" x2="234" y2="0" stroke="#7b4db7" stroke-width="1" opacity="0.4"/>
    <circle cx="240" cy="0" r="3" fill="#8b3faf"/>
    <line x1="246" y1="0" x2="274" y2="0" stroke="#8b3faf" stroke-width="1" opacity="0.4"/>
    <circle cx="280" cy="0" r="3" fill="#9b31a7"/>
    <line x1="286" y1="0" x2="314" y2="0" stroke="#9b31a7" stroke-width="1" opacity="0.4"/>
    <circle cx="320" cy="0" r="3" fill="#7b2ff7"/>
  </g>

  <!-- Stage labels (tiny) -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="7" fill="#8b8ba7" text-anchor="middle" opacity="0.6">
    <text x="260" y="165">intake</text>
    <text x="300" y="165">research</text>
    <text x="340" y="165">roadmap</text>
    <text x="380" y="165">plan</text>
    <text x="420" y="165">execute</text>
    <text x="460" y="165">verify</text>
    <text x="500" y="165">gate</text>
    <text x="540" y="165">advance</text>
    <text x="580" y="165">deploy</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(640, 55)">
    <rect width="48" height="20" rx="10" fill="#7b2ff7" opacity="0.3"/>
    <rect width="48" height="20" rx="10" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
    <text x="24" y="14" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">v3.0</text>
  </g>
</svg>
